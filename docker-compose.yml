services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    environment:
      TZ: 'America/Argentina/Comodoro_Rivadavia'
      WEBPASSWORD: 'pihole420'
    volumes:
      - './config:/etc/pihole'
      - './dnsmasq:/etc/dnsmasq.d'
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - './uptime-kuma:/app/data'
    ports:
      - "3001:3001"
    restart: unless-stopped
